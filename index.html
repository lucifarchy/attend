<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lucifarchy.com</title>
<link href="https://fonts.googleapis.com/css2?family=Malgun+Gothic&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #090910;
    --surface: #111118;
    --surface2: #1e1e2a;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.14);
    --text: #e8e8f0;
    --text-dim: #6b6b88;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { overflow-x: hidden; }
  body {
    font-family: 'Malgun Gothic', '맑은 고딕', 'Apple SD Gothic Neo', sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
  }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 24px; background: var(--surface);
    border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 200;
  }
  .logo { font-size: 16px; font-weight: 900; letter-spacing: 1px; }
  .logo span { color: #5588ff; }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .clock { font-size: 12px; color: var(--text-dim); font-family: monospace; }
  .btn-small {
    font-size: 12px; padding: 5px 12px; background: transparent;
    border: 1px solid var(--border2); color: var(--text-dim);
    border-radius: 6px; cursor: pointer; font-family: inherit; transition: all 0.2s;
  }
  .btn-small:hover, .btn-small.on { border-color: #5588ff; color: #5588ff; }

  /* 홈 */
  #homePage {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: calc(100vh - 49px); padding: 40px 24px;
  }
  .home-tiles {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    width: min(454px, 92vw);
    margin: 0 auto;
  }
  .home-tile {
    height: min(440px, 70vh);
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.08);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px; cursor: pointer; transition: all 0.25s; position: relative; overflow: hidden;
    width: 100%;
  }
  .home-tile::before {
    content: ''; position: absolute; inset: 0;
    background: rgba(255,255,255,0.03);
    opacity: 0; transition: opacity 0.25s;
  }
  .ht-personal:hover { transform: translateY(-5px); border-color: rgba(180,150,255,0.35); box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 40px rgba(150,120,255,0.08); }
  .ht-work:hover { transform: translateY(-5px); border-color: rgba(200,180,140,0.35); box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 40px rgba(200,180,140,0.08); }
  .home-tile:hover::before { opacity: 1; }
  .home-tile:active { transform: scale(0.97); }
  .ht-personal {
    background: linear-gradient(160deg, #1a1a2e 0%, #22213a 60%, #111120 100%);
    border-top: 1px solid rgba(180,160,255,0.25);
    border-left: 1px solid rgba(180,160,255,0.1);
  }
  .ht-work {
    background: linear-gradient(160deg, #1a1a1a 0%, #242424 60%, #111111 100%);
    border-top: 1px solid rgba(200,180,140,0.3);
    border-left: 1px solid rgba(200,180,140,0.1);
  }
  .ht-personal .ht-icon { font-size: 44px; color: #c4b5fd; text-shadow: 0 0 30px rgba(180,150,255,0.4); }
  .ht-work .ht-icon { font-size: 44px; color: #d4c4a0; text-shadow: 0 0 30px rgba(200,180,140,0.35); }
  .ht-label { font-size: 17px; font-weight: 900; color: rgba(255,255,255,0.9); letter-spacing: 6px; }
  .ht-personal .ht-divider { width: 32px; height: 1px; background: rgba(180,150,255,0.35); }
  .ht-work .ht-divider { width: 32px; height: 1px; background: rgba(200,180,140,0.35); }
  .ht-count { font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 2px; }
  .ht-arrow {
    position: absolute; bottom: 20px; right: 20px;
    font-size: 18px; color: rgba(255,255,255,0.25);
    transition: all 0.25s;
  }
  .home-tile:hover .ht-arrow { color: rgba(255,255,255,0.6); transform: translateX(4px); }

  /* 대시 */
  #dashPage { display: none; }
  .dash-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 24px; border-bottom: 1px solid var(--border); background: var(--surface);
  }
  .dash-back {
    font-size: 13px; color: var(--text-dim); cursor: pointer; background: none;
    border: none; font-family: inherit; transition: color 0.2s;
  }
  .dash-back:hover { color: var(--text); }
  .dash-name { font-size: 15px; font-weight: 900; letter-spacing: 2px; }
  .dash-main { padding: 24px; max-width: 860px; margin: 0 auto; }

  /* 카테고리 */
  .cat-section { margin-bottom: 32px; }
  .cat-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .cat-label-text {
    font-size: 11px; font-weight: 700; color: var(--text-dim);
    letter-spacing: 3px; text-transform: uppercase;
    display: flex; align-items: center; gap: 8px;
  }
  .cat-label-text::before { content:''; width:3px; height:13px; background:#5588ff; border-radius:2px; }
  .cat-act-btn {
    font-size: 11px; padding: 3px 9px; border-radius: 4px;
    border: 1px solid var(--border2); background: transparent; color: var(--text-dim);
    cursor: pointer; font-family: inherit; transition: all 0.2s; display: none;
  }
  .edit-mode .cat-act-btn { display: block; }
  .cat-act-btn:hover { border-color: #5588ff; color: #5588ff; }
  .cat-act-btn.del:hover { border-color: #e05555; color: #e05555; }

  /* 타일 그리드 */
  .tile-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    grid-auto-rows: 110px;
    gap: 8px;
  }
  .tile {
    border-radius: 10px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
    cursor: pointer; text-decoration: none; transition: all 0.18s;
    border: 1px solid transparent; position: relative; overflow: hidden; padding: 10px;
  }
  .tile:hover { transform: scale(1.05); border-color: rgba(255,255,255,0.2); filter: brightness(1.12); }
  .tile:active { transform: scale(0.95); }
  .tile.sz-wide { grid-column: span 2; }
  .tile.sz-tall { grid-row: span 2; }
  .tile.sz-big  { grid-column: span 2; grid-row: span 2; }
  .tile-icon { font-size: 26px; line-height: 1; }
  .tile-label { font-size: 12px; font-weight: 700; color: #fff; text-align: center; line-height: 1.3; word-break: keep-all; }
  .tile-del-btn {
    position: absolute; top: 5px; right: 5px; width: 18px; height: 18px;
    border-radius: 50%; background: #e05555; color: #fff; border: none;
    font-size: 11px; cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 5;
  }
  .edit-mode .tile-del-btn { display: flex; }
  .tile-add-btn {
    border-radius: 10px; border: 2px dashed var(--border2); background: transparent;
    color: var(--text-dim); font-size: 24px; cursor: pointer; min-height: 110px;
    display: none; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .edit-mode .tile-add-btn { display: flex; }
  .tile-add-btn:hover { border-color: #5588ff; color: #5588ff; }

  .add-cat-btn {
    width: 100%; padding: 12px; border: 2px dashed var(--border2); background: transparent;
    color: var(--text-dim); border-radius: 10px; font-size: 13px; cursor: pointer;
    display: none; align-items: center; justify-content: center; gap: 8px;
    margin-top: 8px; transition: all 0.2s; font-family: inherit;
  }
  .edit-mode .add-cat-btn { display: flex; }
  .add-cat-btn:hover { border-color: #5588ff; color: #5588ff; }

  /* 모달 */
  .modal-bg {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    z-index: 500; align-items: center; justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 14px; padding: 24px; width: 90%; max-width: 340px;
    display: flex; flex-direction: column; gap: 14px; max-height: 90vh; overflow-y: auto;
  }
  .modal h3 { font-size: 15px; font-weight: 900; }
  .mf { display: flex; flex-direction: column; gap: 5px; }
  .mf label { font-size: 11px; color: var(--text-dim); letter-spacing: 1px; }
  .modal input, .modal select {
    padding: 9px 12px; background: var(--bg); border: 1px solid var(--border2);
    border-radius: 7px; color: var(--text); font-size: 14px; outline: none;
    font-family: inherit; transition: border 0.2s;
  }
  .modal input:focus, .modal select:focus { border-color: #5588ff; }
  .modal input::placeholder { color: var(--text-dim); }
  .swatch-row { display: flex; flex-wrap: wrap; gap: 7px; }
  .swatch {
    width: 30px; height: 30px; border-radius: 7px; cursor: pointer;
    border: 2px solid transparent; transition: all 0.15s; flex-shrink: 0;
  }
  .swatch:hover, .swatch.sel { border-color: #fff; transform: scale(1.15); }
  .custom-color-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
  .custom-color-row label { font-size: 11px; color: var(--text-dim); }
  input[type="color"] {
    width: 40px; height: 30px; padding: 2px; cursor: pointer;
    border-radius: 7px; border: 1px solid var(--border2); background: transparent;
  }
  .size-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 7px; }
  .size-btn {
    padding: 7px 0; border: 1px solid var(--border2); border-radius: 7px;
    background: transparent; color: var(--text-dim); font-size: 12px;
    cursor: pointer; font-family: inherit; text-align: center; transition: all 0.2s;
  }
  .size-btn.sel { border-color: #5588ff; color: #5588ff; background: rgba(85,136,255,0.1); }
  .modal-btns { display: flex; gap: 8px; }
  .modal-btns button {
    flex: 1; padding: 11px; border-radius: 8px; font-size: 14px; font-weight: 700;
    cursor: pointer; border: none; font-family: inherit;
  }
  .btn-cancel { background: var(--surface); color: var(--text-dim); }
  .btn-ok { background: #3366dd; color: #fff; }
  .btn-ok:hover { background: #5588ff; }

  @media (max-width: 480px) {
    .home-tiles { max-width: 340px; }
    .tile-grid { grid-template-columns: repeat(auto-fill, minmax(90px,1fr)); grid-auto-rows: 90px; }
    .tile-add-btn { min-height: 90px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">lucifarchy<span>.com</span></div>
  <div class="topbar-right">
    <div class="clock" id="clock"></div>
    <button class="btn-small" id="editBtn" onclick="toggleEdit()">편집</button>
  </div>
</div>

<!-- 홈 -->
<div id="homePage">
  <div class="home-tiles">
    <div class="home-tile ht-personal" onclick="openDash('personal')">
      <div class="ht-icon">✦</div>
      <div class="ht-label">개인용</div>
      <div class="ht-divider"></div>
      <div class="ht-count" id="cntPersonal">0개</div>
      <div class="ht-arrow">→</div>
    </div>
    <div class="home-tile ht-work" onclick="openDash('work')">
      <div class="ht-icon">◈</div>
      <div class="ht-label">업무용</div>
      <div class="ht-divider"></div>
      <div class="ht-count" id="cntWork">0개</div>
      <div class="ht-arrow">→</div>
    </div>
  </div>
</div>

<!-- 대시 -->
<div id="dashPage">
  <div class="dash-header">
    <button class="dash-back" onclick="goHome()">← 홈</button>
    <div class="dash-name" id="dashName"></div>
    <div style="width:60px"></div>
  </div>
  <div class="dash-main" id="dashMain"></div>
</div>

<!-- 타일 모달 -->
<div class="modal-bg" id="tileModal">
  <div class="modal">
    <h3>링크 추가</h3>
    <div class="mf"><label>이름</label><input id="tName" placeholder="예) 패들렛"></div>
    <div class="mf"><label>URL</label><input id="tUrl" placeholder="https://..."></div>
    <div class="mf"><label>아이콘 (이모지)</label><input id="tIcon" placeholder="🔗" maxlength="2"></div>
    <div class="mf">
      <label>색상</label>
      <div class="swatch-row" id="swatches"></div>
      <div class="custom-color-row">
        <label>직접 선택</label>
        <input type="color" id="colorPick" value="#1a3a8f" oninput="setCustom(this.value)">
      </div>
    </div>
    <div class="mf">
      <label>크기</label>
      <div class="size-row" id="sizeRow"></div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeTM()">취소</button>
      <button class="btn-ok" onclick="saveTile()">추가</button>
    </div>
  </div>
</div>

<!-- 카테고리 모달 -->
<div class="modal-bg" id="catModal">
  <div class="modal">
    <h3>카테고리 추가</h3>
    <div class="mf"><label>이름</label><input id="cName" placeholder="예) 학교"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeCM()">취소</button>
      <button class="btn-ok" onclick="saveCat()">추가</button>
    </div>
  </div>
</div>

<script>
const PRESETS = ['#1a3a8f','#0f7a3e','#7a1a1a','#5b2a8b','#0e6b6b','#7a4e0f','#1a5c3a','#0a4a6b','#6b1a4a','#2a4a1a','#3a1a00','#003a4a'];
const SIZES = [{k:'normal',l:'기본'},{k:'wide',l:'넓게'},{k:'tall',l:'높게'},{k:'big',l:'크게'}];
const DEFAULT_DATA = {
  personal:[{id:'p1',name:'개인 링크',tiles:[
    {id:'t1',name:'패들렛',url:'https://padlet.com',icon:'📌',color:'#1a3a8f',size:'normal'},
    {id:'t2',name:'ChatGPT',url:'https://chat.openai.com',icon:'🤖',color:'#0f7a3e',size:'normal'},
    {id:'t3',name:'Claude',url:'https://claude.ai',icon:'🤖',color:'#5b2a8b',size:'normal'},
    {id:'t4',name:'Gemini',url:'https://gemini.google.com',icon:'🤖',color:'#0e6b6b',size:'normal'},
    {id:'t5',name:'등록부',url:'./attendance.html',icon:'📋',color:'#1a3a8f',size:'wide'},
  ]}],
  work:[
    {id:'w1',name:'학교',tiles:[
      {id:'w1t1',name:'구글 드라이브',url:'https://drive.google.com',icon:'📁',color:'#1a5c3a',size:'normal'},
      {id:'w1t2',name:'구글 문서',url:'https://docs.google.com',icon:'📝',color:'#0a4a6b',size:'normal'},
      {id:'w1t3',name:'구글 시트',url:'https://sheets.google.com',icon:'📊',color:'#0f7a3e',size:'normal'},
      {id:'w1t4',name:'구글 폼',url:'https://forms.google.com',icon:'📋',color:'#7a4e0f',size:'normal'},
    ]},
    {id:'w2',name:'학급',tiles:[
      {id:'w2t1',name:'패들렛',url:'https://padlet.com',icon:'📌',color:'#7a1a1a',size:'normal'},
      {id:'w2t2',name:'등록부',url:'./attendance.html',icon:'📋',color:'#1a3a8f',size:'wide'},
    ]},
    {id:'w3',name:'공통',tiles:[
      {id:'w3t1',name:'ChatGPT',url:'https://chat.openai.com',icon:'🤖',color:'#0f7a3e',size:'normal'},
      {id:'w3t2',name:'Claude',url:'https://claude.ai',icon:'🤖',color:'#5b2a8b',size:'normal'},
    ]},
    {id:'w4',name:'외부',tiles:[]}
  ]
};

let data, curTab='personal', isEdit=false, addCatId=null, selColor=PRESETS[0], selSize='normal';
try { data = JSON.parse(localStorage.getItem('lf_data')) || DEFAULT_DATA; } catch(e) { data = DEFAULT_DATA; }
function save() { localStorage.setItem('lf_data', JSON.stringify(data)); }

setInterval(()=>{ document.getElementById('clock').textContent = new Date().toLocaleTimeString('ko-KR'); }, 1000);
document.getElementById('clock').textContent = new Date().toLocaleTimeString('ko-KR');

function updateCounts() {
  ['personal','work'].forEach(t => {
    const n = (data[t]||[]).reduce((s,c)=>s+c.tiles.length,0);
    document.getElementById(t==='personal'?'cntPersonal':'cntWork').textContent = n+'개';
  });
}

function openDash(tab) {
  curTab = tab;
  document.getElementById('homePage').style.display = 'none';
  document.getElementById('dashPage').style.display = 'block';
  document.getElementById('dashName').textContent = tab==='personal'?'개인용':'업무용';
  render();
}

function goHome() {
  document.getElementById('dashPage').style.display = 'none';
  document.getElementById('homePage').style.display = 'flex';
  updateCounts();
}

function toggleEdit() {
  isEdit = !isEdit;
  const btn = document.getElementById('editBtn');
  btn.textContent = isEdit ? '완료' : '편집';
  btn.classList.toggle('on', isEdit);
  render();
}

function render() {
  const main = document.getElementById('dashMain');
  const cats = data[curTab] || [];
  main.innerHTML = cats.map(cat => `
    <div class="cat-section">
      <div class="cat-header">
        <div class="cat-label-text">${cat.name}</div>
        <div><button class="cat-act-btn del" onclick="delCat('${cat.id}')">삭제</button></div>
      </div>
      <div class="tile-grid">
        ${cat.tiles.map(t => {
          const sc = t.size && t.size!=='normal' ? ` sz-${t.size}` : '';
          return `<a class="tile${sc}" href="${t.url}" target="_blank" rel="noopener"
            style="background:${t.color}" onclick="if(isEdit){event.preventDefault()}">
            <button class="tile-del-btn" onclick="event.preventDefault();event.stopPropagation();delTile('${cat.id}','${t.id}')">×</button>
            <div class="tile-icon">${t.icon}</div>
            <div class="tile-label">${t.name}</div>
          </a>`;
        }).join('')}
        <button class="tile-add-btn" onclick="openTM('${cat.id}')">+</button>
      </div>
    </div>`).join('') + `<button class="add-cat-btn" onclick="openCM()">+ 카테고리 추가</button>`;
  if (isEdit) main.classList.add('edit-mode'); else main.classList.remove('edit-mode');
}

function delTile(catId, tileId) {
  const c = data[curTab].find(c=>c.id===catId);
  if (c) c.tiles = c.tiles.filter(t=>t.id!==tileId);
  save(); render();
}

function delCat(catId) {
  if (!confirm('카테고리와 링크가 모두 삭제됩니다.')) return;
  data[curTab] = data[curTab].filter(c=>c.id!==catId);
  save(); render();
}

function openTM(catId) {
  addCatId=catId; selColor=PRESETS[0]; selSize='normal';
  ['tName','tUrl','tIcon'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('colorPick').value = selColor;
  renderSwatches(); renderSizes();
  document.getElementById('tileModal').classList.add('open');
}
function closeTM() { document.getElementById('tileModal').classList.remove('open'); }

function renderSwatches() {
  document.getElementById('swatches').innerHTML = PRESETS.map(c=>
    `<div class="swatch${c===selColor?' sel':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`
  ).join('');
}
function renderSizes() {
  document.getElementById('sizeRow').innerHTML = SIZES.map(s=>
    `<button class="size-btn${s.k===selSize?' sel':''}" onclick="pickSize('${s.k}')">${s.l}</button>`
  ).join('');
}
function pickColor(c) { selColor=c; document.getElementById('colorPick').value=c; renderSwatches(); }
function setCustom(c) { selColor=c; renderSwatches(); }
function pickSize(s) { selSize=s; renderSizes(); }

function saveTile() {
  const name=document.getElementById('tName').value.trim();
  const url=document.getElementById('tUrl').value.trim();
  const icon=document.getElementById('tIcon').value.trim()||'🔗';
  if (!name||!url) { alert('이름과 URL을 입력해주세요.'); return; }
  const c=data[curTab].find(c=>c.id===addCatId);
  if (c) c.tiles.push({id:'t'+Date.now(),name,url,icon,color:selColor,size:selSize});
  save(); closeTM(); render();
}

function openCM() { document.getElementById('cName').value=''; document.getElementById('catModal').classList.add('open'); }
function closeCM() { document.getElementById('catModal').classList.remove('open'); }
function saveCat() {
  const name=document.getElementById('cName').value.trim();
  if (!name) { alert('이름을 입력해주세요.'); return; }
  data[curTab].push({id:'c'+Date.now(),name,tiles:[]});
  save(); closeCM(); render();
}

['tileModal','catModal'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
});

updateCounts();
</script>
</body>
</html>
