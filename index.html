<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lucifarchy.com</title>
<link href="https://fonts.googleapis.com/css2?family=Malgun+Gothic&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f6fa; --surface: #ffffff; --surface2: #f0f2f7;
    --border: rgba(0,0,0,0.08); --border2: rgba(0,0,0,0.14);
    --text: #1a1a2e; --text-dim: #888aaa; --accent: #3366dd;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { overflow-x: hidden; }
  body {
    font-family: 'Malgun Gothic', '맑은 고딕', 'Apple SD Gothic Neo', sans-serif;
    background: #f4f6fa; color: #1a1a2e; min-height: 100vh;
  }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 24px; background: var(--surface);
    border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 200;
  }
  .logo { font-size: 16px; font-weight: 900; letter-spacing: 1px; }
  .logo span { color: #5588ff; }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .clock { font-size: 12px; color: var(--text-dim); font-family: monospace; }
  .btn-small {
    font-size: 12px; padding: 5px 12px; background: transparent;
    border: 1px solid var(--border2); color: var(--text-dim);
    border-radius: 6px; cursor: pointer; font-family: inherit; transition: all 0.2s;
  }
  .btn-small:hover, .btn-small.on { border-color: #5588ff; color: #5588ff; }

  /* 홈 — PC: 4열, 모바일: 2열 */
  #homePage {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto auto;
    gap: 12px;
    padding: 20px;
    max-width: 1100px;
    margin: 0 auto;
    width: 100%;
    box-sizing: border-box;
  }
  .ht-personal-wrap   { grid-column: 1; grid-row: 1; }
  .ht-work-wrap       { grid-column: 2; grid-row: 1; }
  #homeCalPanel       { grid-column: 1; grid-row: 2; }
  .home-tt-memo       { grid-column: 2; grid-row: 2; }
  .home-student-panel { grid-column: 1; grid-row: 3; }
  .home-memo-panel    { grid-column: 2; grid-row: 3; }

  .home-left { display: contents; }
  .home-right { display: contents; }
  .home-tiles { display: contents; }

  .home-tile {
    width: 100%; height: 100%;
    min-height: min(340px, 40vh);
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.08);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; cursor: pointer; transition: all 0.25s; position: relative; overflow: hidden;
  }

  /* 모바일: 2열 */
  @media (max-width: 700px) {
    #homePage {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto auto;
      gap: 8px;
      padding: 8px;
      min-height: auto;
      width: 100vw;
      max-width: 100vw;
      box-sizing: border-box;
      overflow-x: hidden;
    }
    .ht-personal-wrap, .ht-work-wrap,
    #homeCalPanel, .home-tt-memo,
    .home-student-panel, .home-memo-panel {
      min-width: 0; width: 100%; box-sizing: border-box;
    }
    .ht-personal-wrap   { grid-column: 1; grid-row: 1; }
    .ht-work-wrap       { grid-column: 2; grid-row: 1; }
    #homeCalPanel       { grid-column: 1; grid-row: 2; }
    .home-tt-memo       { grid-column: 2; grid-row: 2; }
    .home-student-panel { grid-column: 1; grid-row: 3; }
    .home-memo-panel    { grid-column: 2; grid-row: 3; }
    /* 버튼 */
    .home-tile { min-height: 90px !important; height: 90px !important; gap: 5px; border-radius: 12px !important; }
    .ht-icon { font-size: 20px !important; }
    .ht-label { font-size: 12px !important; letter-spacing: 1px !important; }
    .ht-count { font-size: 9px !important; }
    .ht-divider { display: none !important; }
    .ht-arrow { display: none !important; }
    /* 달력 */
    #homeCalPanel { padding: 8px !important; }
    #homeCalMonth { font-size: 10px !important; }
    #homeCalGrid > div { font-size: 8px !important; padding: 3px 0 !important; }
    /* 시간표 */
    .home-tt-memo { padding: 8px !important; overflow: hidden !important; }
    #homeTimetable { table-layout: fixed; width: 100% !important; }
    #homeTimetable th, #homeTimetable td { font-size: 7px !important; padding: 1px 0 !important; overflow: hidden; }
    #homeTimetable input { font-size: 7px !important; height: 18px !important; padding: 0 !important; }
    /* 학생명단 */
    .home-student-panel { padding: 8px !important; }
    #homeStudentList > div { padding: 4px 5px !important; gap: 3px !important; }
    #homeStudentList > div span { font-size: 9px !important; }
    #homeStudentInput { font-size: 10px !important; padding: 4px 6px !important; }
    /* 메모 */
    .home-memo-panel { padding: 8px !important; }
    #homeMemoText { font-size: 10px !important; min-height: 80px !important; padding: 6px !important; }
  }
  .home-tile::before {
    content: ''; position: absolute; inset: 0;
    background: rgba(255,255,255,0.03);
    opacity: 0; transition: opacity 0.25s;
  }
  .ht-personal:hover { transform: translateY(-5px); box-shadow: 0 16px 40px rgba(0,0,0,0.25); }
  .ht-work:hover { transform: translateY(-5px); box-shadow: 0 16px 40px rgba(0,0,0,0.12); border-color: rgba(0,0,0,0.2); }
  .home-tile:hover::before { opacity: 1; }
  .home-tile:active { transform: scale(0.97); }
  .ht-personal {
    background: #1a1a1a;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 6px 24px rgba(0,0,0,0.15);
  }
  .ht-work {
    background: #f5f5f5;
    border: 1px solid rgba(0,0,0,0.1);
    box-shadow: 0 6px 24px rgba(0,0,0,0.08);
  }
  .ht-personal .ht-icon { font-size: 44px; color: #ffffff; }
  .ht-work .ht-icon { font-size: 44px; color: #1a1a1a; }
  .ht-personal .ht-label { color: #ffffff; } .ht-work .ht-label { color: #1a1a1a; } .ht-label { font-size: 17px; font-weight: 900; letter-spacing: 6px; }
  .ht-personal .ht-divider { width: 32px; height: 1px; background: rgba(255,255,255,0.2); }
  .ht-work .ht-divider { width: 32px; height: 1px; background: rgba(0,0,0,0.15); }
  .ht-personal .ht-count { color: rgba(255,255,255,0.4); } .ht-work .ht-count { color: rgba(0,0,0,0.35); } .ht-count { font-size: 11px; letter-spacing: 2px; }
  .ht-arrow {
    position: absolute; bottom: 20px; right: 20px;
    font-size: 18px; color: rgba(128,128,128,0.4);
    transition: all 0.25s;
  }
  .home-tile:hover .ht-arrow { color: rgba(128,128,128,0.8); transform: translateX(4px); }

  /* 대시 */
  #dashPage { display: none; }
  .dash-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 24px; border-bottom: 1px solid var(--border); background: var(--surface);
    box-shadow: 0 1px 6px rgba(0,0,0,0.05);
  }
  .dash-back {
    font-size: 13px; color: var(--text-dim); cursor: pointer; background: none;
    border: none; font-family: inherit; transition: color 0.2s;
  }
  .dash-back:hover { color: var(--text); }
  .dash-name { font-size: 15px; font-weight: 900; letter-spacing: 2px; }
  .dash-main { padding: 24px; max-width: 860px; margin: 0 auto; }

  /* 카테고리 */
  .cat-section { margin-bottom: 32px; }
  .cat-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .cat-label-text {
    font-size: 22px; font-weight: 700; color: var(--text-dim);
    letter-spacing: 2px;
    display: flex; align-items: center; gap: 8px;
  }
  .cat-label-text::before { content:''; width:3px; height:13px; background:#5588ff; border-radius:2px; }
  .cat-act-btn {
    font-size: 11px; padding: 3px 9px; border-radius: 4px;
    border: 1px solid var(--border2); background: transparent; color: var(--text-dim);
    cursor: pointer; font-family: inherit; transition: all 0.2s; display: none;
  }
  .edit-mode .cat-act-btn { display: block; }
  .cat-act-btn:hover { border-color: #5588ff; color: #5588ff; }
  .cat-act-btn.del:hover { border-color: #e05555; color: #e05555; }

  /* 타일 그리드 */
  .tile-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    grid-auto-rows: 110px;
    gap: 8px;
  }
  .tile {
    border-radius: 10px; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
    cursor: pointer; text-decoration: none; transition: all 0.18s;
    border: 1px solid transparent; position: relative; overflow: hidden; padding: 10px;
  }
  .tile:hover { transform: scale(1.05); border-color: rgba(0,0,0,0.15); filter: brightness(1.08); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
  .tile:active { transform: scale(0.95); }
  .tile.sz-wide { grid-column: span 2; }
  .tile.sz-tall { grid-row: span 2; }
  .tile.sz-big  { grid-column: span 2; grid-row: span 2; }
  .tile-icon { font-size: 26px; line-height: 1; }
  .tile-label { font-size: 12px; font-weight: 700; color: #fff; text-align: center; line-height: 1.3; word-break: keep-all; }
  .tile-del-btn {
    position: absolute; top: 5px; right: 5px; width: 18px; height: 18px;
    border-radius: 50%; background: #e05555; color: #fff; border: none;
    font-size: 11px; cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 5;
  }
  .edit-mode .tile-del-btn { display: flex; }
  .tile-add-btn {
    border-radius: 10px; border: 2px dashed rgba(0,0,0,0.15); background: rgba(0,0,0,0.02);
    color: var(--text-dim); font-size: 24px; cursor: pointer; min-height: 110px;
    display: none; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .edit-mode .tile-add-btn { display: flex; }
  .tile-add-btn:hover { border-color: #5588ff; color: #5588ff; }

  .add-cat-btn {
    width: 100%; padding: 12px; border: 2px dashed rgba(0,0,0,0.12); background: rgba(0,0,0,0.02);
    color: var(--text-dim); border-radius: 10px; font-size: 13px; cursor: pointer;
    display: none; align-items: center; justify-content: center; gap: 8px;
    margin-top: 8px; transition: all 0.2s; font-family: inherit;
  }
  .edit-mode .add-cat-btn { display: flex; }
  .add-cat-btn:hover { border-color: #5588ff; color: #5588ff; }

  /* 모달 */
  .modal-bg {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4);
    z-index: 500; align-items: center; justify-content: center;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12); padding: 24px; width: 90%; max-width: 340px;
    display: flex; flex-direction: column; gap: 14px; max-height: 90vh; overflow-y: auto;
  }
  .modal h3 { font-size: 15px; font-weight: 900; }
  .mf { display: flex; flex-direction: column; gap: 5px; }
  .mf label { font-size: 11px; color: var(--text-dim); letter-spacing: 1px; }
  .modal input, .modal select {
    padding: 9px 12px; background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 7px; color: var(--text); font-size: 14px; outline: none;
    font-family: inherit; transition: border 0.2s;
  }
  .modal input:focus, .modal select:focus { border-color: #5588ff; }
  .modal input::placeholder { color: var(--text-dim); }
  .swatch-row { display: flex; flex-wrap: wrap; gap: 7px; }
  .swatch {
    width: 30px; height: 30px; border-radius: 7px; cursor: pointer;
    border: 2px solid transparent; transition: all 0.15s; flex-shrink: 0;
  }
  .swatch:hover, .swatch.sel { border-color: #fff; transform: scale(1.15); }
  .custom-color-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
  .custom-color-row label { font-size: 11px; color: var(--text-dim); }
  input[type="color"] {
    width: 40px; height: 30px; padding: 2px; cursor: pointer;
    border-radius: 7px; border: 1px solid var(--border2); background: transparent;
  }
  .size-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 7px; }
  .size-btn {
    padding: 7px 0; border: 1px solid var(--border2); border-radius: 7px;
    background: transparent; color: var(--text-dim); font-size: 12px;
    cursor: pointer; font-family: inherit; text-align: center; transition: all 0.2s;
  }
  .size-btn.sel { border-color: #5588ff; color: #5588ff; background: rgba(85,136,255,0.1); }
  .modal-btns { display: flex; gap: 8px; }
  .modal-btns button {
    flex: 1; padding: 11px; border-radius: 8px; font-size: 14px; font-weight: 700;
    cursor: pointer; border: none; font-family: inherit;
  }
  .btn-cancel { background: var(--surface2); color: var(--text-dim); }
  .btn-ok { background: #3366dd; color: #fff; }
  .btn-ok:hover { background: #5588ff; }

  @media (max-width: 480px) {
    .home-tiles { max-width: 340px; }
    .tile-grid { grid-template-columns: repeat(auto-fill, minmax(90px,1fr)); grid-auto-rows: 90px; }
    .tile-add-btn { min-height: 90px; }
  }

  /* 드래그 */
  .cat-section { cursor: default; }
  .cat-section.dragging { opacity: 0.4; }
  .cat-section.drag-over { border-top: 2px solid var(--accent); margin-top: -2px; }
  .drag-handle {
    cursor: grab; font-size: 14px; color: var(--text-dim);
    padding: 2px 6px; display: none; user-select: none;
    transition: color 0.2s;
  }
  .drag-handle:active { cursor: grabbing; }
  .drag-handle:hover { color: #5588ff; }
  .edit-mode .drag-handle { display: block; }

  .tile-drag-handle {
    position: absolute; top: 5px; left: 5px;
    font-size: 12px; color: rgba(255,255,255,0.4);
    display: none; cursor: grab; z-index: 5; line-height: 1;
  }
  .edit-mode .tile-drag-handle { display: block; }
  .tile.tile-dragging { opacity: 0.4; }
  .tile.tile-drag-over { outline: 2px solid #5588ff; }




  @media (min-width: 701px) {
    body { font-size: 16px; }
    .logo { font-size: 18px !important; }
    .clock { font-size: 14px !important; }
    .btn-small { font-size: 13px !important; }
    /* 달력 */
    #homeCalMonth { font-size: 17px !important; }
    #homeCalGrid > div { font-size: 14px !important; padding: 6px 2px !important; }
    /* 시간표 */
    #homeTimetable th, #homeTimetable td { font-size: 13px !important; }
    #homeTimetable input { font-size: 12px !important; height: 34px !important; }
    /* 메모 */
    #homeMemoText { font-size: 15px !important; }
    #homeMemoStatus { font-size: 13px !important; }
    /* 학생 명단 */
    #homeStudentList > div span { font-size: 14px !important; }
    #homeStudentInput { font-size: 14px !important; padding: 8px 10px !important; }
    /* 패널 타이틀 */
    .home-tt-memo div[style*="letter-spacing"],
    #homeCalPanel ~ div div[style*="letter-spacing"] { font-size: 13px !important; }
    /* 버튼 */
    .ht-label { font-size: 20px !important; }
    .ht-icon { font-size: 50px !important; }
    .ht-count { font-size: 14px !important; }
    /* 대시보드 */
    .tile-label { font-size: 14px !important; }
    .tile-icon { font-size: 30px !important; }
    .cat-label-text { font-size: 26px !important; }
    .dash-name { font-size: 18px !important; }
    .modal h3 { font-size: 18px !important; }
    .mf label { font-size: 14px !important; }
    .modal input, .modal select { font-size: 16px !important; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo" onclick="goHome()" style="cursor:pointer;">lucifarchy<span>.com</span></div>
  <div class="topbar-right">
    <div class="search-wrap" id="searchWrap" style="position:relative;display:none;">
      <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text-dim);pointer-events:none;">🔍</span>
      <input id="searchInput" style="background:var(--surface2);border:1px solid var(--border2);border-radius:20px;padding:6px 14px 6px 32px;color:var(--text);font-size:13px;outline:none;width:180px;font-family:inherit;transition:all 0.2s;box-shadow:inset 0 1px 3px rgba(0,0,0,0.06);" placeholder="링크 검색..." oninput="doSearch(this.value)" onblur="setTimeout(closeSearch,200)">
      <div id="searchResults" style="position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;overflow:hidden;z-index:200;display:none;min-width:220px;"></div>
    </div>
    <button class="btn-small" id="searchToggle" onclick="toggleSearch()">🔍</button>
    <div class="clock" id="clock"></div>
    <button class="btn-small" id="editBtn" onclick="toggleEdit()">편집</button>
  </div>
</div>

<!-- 홈 -->
<div id="homePage">

  <!-- 개인용 버튼 (col1, row1) -->
  <div class="ht-personal-wrap">
    <div class="home-tile ht-personal" onclick="openDash('personal')">
      <div class="ht-icon">✦</div>
      <div class="ht-label">개인용</div>
      <div class="ht-divider"></div>
      <div class="ht-count" id="cntPersonal">0개</div>
      <div class="ht-arrow">→</div>
    </div>
  </div>

  <!-- 업무용 버튼 (col2, row1) -->
  <div class="ht-work-wrap">
    <div class="home-tile ht-work" onclick="openDash('work')">
      <div class="ht-icon">◈</div>
      <div class="ht-label">업무용</div>
      <div class="ht-divider"></div>
      <div class="ht-count" id="cntWork">0개</div>
      <div class="ht-arrow">→</div>
    </div>
  </div>

  <!-- 달력 (col1, row2) -->
  <div id="homeCalPanel" style="background:#ffffff;border:1px solid rgba(0,0,0,0.08);border-radius:12px;padding:14px;box-shadow:0 1px 6px rgba(0,0,0,0.05);">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <button onclick="homeCalMove(-1)" style="background:none;border:1px solid rgba(0,0,0,0.12);color:#888aaa;border-radius:6px;padding:3px 9px;cursor:pointer;font-size:13px;">‹</button>
      <div id="homeCalMonth" style="font-size:13px;font-weight:700;color:#1a1a2e;"></div>
      <button onclick="homeCalMove(1)" style="background:none;border:1px solid rgba(0,0,0,0.12);color:#888aaa;border-radius:6px;padding:3px 9px;cursor:pointer;font-size:13px;">›</button>
    </div>
    <div id="homeCalGrid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;"></div>
  </div>

  <!-- 시간표 (col2, row2) -->
  <div class="home-tt-memo" style="background:#ffffff;border:1px solid rgba(0,0,0,0.08);border-radius:12px;padding:14px;box-shadow:0 1px 6px rgba(0,0,0,0.05);">
    <div style="font-size:11px;font-weight:700;color:#888aaa;letter-spacing:2px;margin-bottom:8px;display:flex;align-items:center;gap:6px;">
      <span style="width:3px;height:11px;background:#3366dd;border-radius:2px;display:inline-block;"></span>시간표
      <span style="font-size:9px;color:#ccc;margin-left:auto;">우클릭→색상</span>
    </div>
    <div style="overflow-x:auto;">
      <table id="homeTimetable" style="width:100%;border-collapse:collapse;font-size:10px;min-width:150px;"></table>
    </div>
  </div>

  <!-- 학생 명단 (col1, row3) -->
  <div class="home-student-panel" style="background:#ffffff;border:1px solid rgba(0,0,0,0.08);border-radius:12px;padding:14px;box-shadow:0 1px 6px rgba(0,0,0,0.05);display:flex;flex-direction:column;">
    <div style="font-size:11px;font-weight:700;color:#888aaa;letter-spacing:2px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;">
      <div style="display:flex;align-items:center;gap:6px;"><span style="width:3px;height:11px;background:#3366dd;border-radius:2px;display:inline-block;"></span>학생 명단</div>
      <span id="homeAttSum" style="font-size:10px;color:#888aaa;"></span>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:8px;">
      <input id="homeStudentInput" style="flex:1;background:#f7f8fc;border:1px solid rgba(0,0,0,0.1);border-radius:6px;padding:6px 8px;color:#1a1a2e;font-size:12px;outline:none;font-family:inherit;" placeholder="이름" onkeydown="if(event.key==='Enter')homeAddStudent()">
      <button onclick="homeAddStudent()" style="padding:6px 12px;background:#3366dd;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:700;">+</button>
    </div>
    <div id="homeStudentList" style="display:flex;flex-direction:column;gap:4px;max-height:100%;overflow-y:auto;flex:1;"></div>
  </div>

  <!-- 메모 (col2, row3) -->
  <div class="home-memo-panel" style="background:#ffffff;border:1px solid rgba(0,0,0,0.08);border-radius:12px;padding:14px;box-shadow:0 1px 6px rgba(0,0,0,0.05);display:flex;flex-direction:column;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <div style="font-size:11px;font-weight:700;color:#888aaa;letter-spacing:2px;display:flex;align-items:center;gap:6px;">

<script>

  ]}],
  work:[
    {id:'w1',name:'학교',tiles:[
      {id:'w1t1',name:'구글 드라이브',url:'https://drive.google.com',icon:'📁',color:'#1a5c3a',size:'normal'},

      {id:'w1t3',name:'구글 시트',url:'https://sheets.google.com',icon:'📊',color:'#0f7a3e',size:'normal'},
      {id:'w1t4',name:'구글 폼',url:'https://forms.google.com',icon:'📋',color:'#7a4e0f',size:'normal'},
    ]},
    {id:'w2',name:'학급',tiles:[
      {id:'w2t1',name:'패들렛',url:'https://padlet.com',icon:'📌',color:'#7a1a1a',size:'normal'},
      {id:'w2t2',name:'등록부',url:'./attendance.html',icon:'📋',color:'#1a3a8f',size:'wide'},
    ]},
    {id:'w3',name:'공통',tiles:[
      {id:'w3t1',name:'ChatGPT',url:'https://chat.openai.com',icon:'🤖',color:'#0f7a3e',size:'normal'},
      {id:'w3t2',name:'Claude',url:'https://claude.ai',icon:'🤖',color:'#5b2a8b',size:'normal'},

let data, curTab='personal', isEdit=false, addCatId=null, selColor=PRESETS[0], selSize='normal';

    document.getElementById('dashPage').style.display = 'none';

function toggleEdit() {
  isEdit = !isEdit;

function render() {
  const main = document.getElementById('dashMain');
  const cats = data[curTab] || [];
  main.innerHTML = cats.map((cat, idx) => `

          const sc = t.size && t.size!=='normal' ? ` sz-${t.size}` : '';

// 드래그 앤 드롭
let dragSrc = null;
function initDrag() {
  const sections = document.querySelectorAll('.cat-section');
  sections.forEach(sec => {
    const handle = sec.querySelector('.drag-handle');
    if (!handle) return;
    handle.addEventListener('mousedown', () => { sec.draggable = true; });
    handle.addEventListener('touchstart', () => { sec.draggable = true; }, {passive:true});
    sec.addEventListener('dragstart', e => {
      dragSrc = sec;
      setTimeout(() => sec.classList.add('dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
    });
    sec.addEventListener('dragend', () => {
      sec.draggable = false;
      sec.classList.remove('dragging');
      document.querySelectorAll('.cat-section').forEach(s => s.classList.remove('drag-over'));
    });
    sec.addEventListener('dragover', e => {
      e.preventDefault();
      if (sec !== dragSrc) {
        document.querySelectorAll('.cat-section').forEach(s => s.classList.remove('drag-over'));
        sec.classList.add('drag-over');
      }
    });
    sec.addEventListener('drop', e => {
      e.preventDefault();
      if (!dragSrc || dragSrc === sec) return;
      sec.classList.remove('drag-over');
      const cats = data[curTab];
      const fromId = dragSrc.dataset.id;
      const toId = sec.dataset.id;
      const fi = cats.findIndex(c=>c.id===fromId);
      const ti = cats.findIndex(c=>c.id===toId);
      const [moved] = cats.splice(fi, 1);
      cats.splice(ti, 0, moved);
      save(); render();
    });
  });

  // 타일 드래그
  let tileDragSrc = null;
  document.querySelectorAll('.tile').forEach(tile => {
    const th = tile.querySelector('.tile-drag-handle');
    if (!th) return;
    th.addEventListener('mousedown', e => { e.preventDefault(); tile.draggable = true; });
    tile.addEventListener('dragstart', e => {
      tileDragSrc = tile;
      setTimeout(() => tile.classList.add('tile-dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
      e.stopPropagation();
    });
    tile.addEventListener('dragend', () => {
      tile.draggable = false;
      tile.classList.remove('tile-dragging');
      document.querySelectorAll('.tile').forEach(t => t.classList.remove('tile-drag-over'));
    });
    tile.addEventListener('dragover', e => {
      e.preventDefault(); e.stopPropagation();
      if (tile !== tileDragSrc) {
        document.querySelectorAll('.tile').forEach(t => t.classList.remove('tile-drag-over'));
        tile.classList.add('tile-drag-over');
      }
    });
    tile.addEventListener('drop', e => {
      e.preventDefault(); e.stopPropagation();
      if (!tileDragSrc || tileDragSrc === tile) return;
      tile.classList.remove('tile-drag-over');
      const fromCatId = tileDragSrc.dataset.cid;
      const fromTileId = tileDragSrc.dataset.tid;
      const toCatId = tile.dataset.cid;
      const toTileId = tile.dataset.tid;
      const fromCat = data[curTab].find(c=>c.id===fromCatId);
      const toCat = data[curTab].find(c=>c.id===toCatId);
      if (!fromCat || !toCat) return;
      const fi = fromCat.tiles.findIndex(t=>t.id===fromTileId);
      const ti = toCat.tiles.findIndex(t=>t.id===toTileId);
      const [moved] = fromCat.tiles.splice(fi, 1);
      toCat.tiles.splice(ti, 0, moved);
      save(); render();
    });
  });
}

// 카테고리 수정
let editCatId = null;
function editCat(catId) {

function renderSwatches() {

function renderSizes() {

function pickColor(c) { selColor=c; document.getElementById('colorPick').value=c; renderSwatches(); }
function setCustom(c) { selColor=c; renderSwatches(); }

let editTileId = null;
let editTileCatId = null;

function editTile(catId, tileId) {
  const cat = data[curTab].find(c=>c.id===catId);
  if (!cat) return;
  const tile = cat.tiles.find(t=>t.id===tileId);
  if (!tile) return;
  editTileId = tileId;
  editTileCatId = catId;
  addCatId = catId;
  selColor = tile.color || PRESETS[0];
  selSize = tile.size || 'normal';
  document.getElementById('tName').value = tile.name;
  document.getElementById('tUrl').value = tile.url;
  document.getElementById('tIcon').value = tile.icon || '';
  document.getElementById('colorPick').value = selColor;
  document.getElementById('tileModalTitle').textContent = '링크 수정';
  document.getElementById('tileSaveBtn').textContent = '저장';
  renderSwatches(); renderSizes();
  document.getElementById('tileModal').classList.add('open');
}

function saveTile() {
  const name=document.getElementById('tName').value.trim();
  const url=document.getElementById('tUrl').value.trim();
  const icon=document.getElementById('tIcon').value.trim()||'🔗';
  if (!name||!url) { alert('이름과 URL을 입력해주세요.'); return; }
  if (editTileId) {
    const cat = data[curTab].find(c=>c.id===editTileCatId);
    if (cat) {
      const tile = cat.tiles.find(t=>t.id===editTileId);
      if (tile) { tile.name=name; tile.url=url; tile.icon=icon; tile.color=selColor; tile.size=selSize; }
    }
  } else {
    const c=data[curTab].find(c=>c.id===addCatId);
    if (c) c.tiles.push({id:'t'+Date.now(),name,url,icon,color:selColor,size:selSize});
  }
  save(); closeTM(); render();
}

function openCM() {
  editCatId = null;
  document.getElementById('cName').value='';
  document.getElementById('catModalTitle').textContent = '카테고리 추가';
  document.getElementById('catSaveBtn').textContent = '추가';
  document.getElementById('catModal').classList.add('open');
}
function closeCM() { document.getElementById('catModal').classList.remove('open'); }
function saveCat() {
  const name=document.getElementById('cName').value.trim();
  if (!name) { alert('이름을 입력해주세요.'); return; }
  if (editCatId) {
    const cat = data[curTab].find(c=>c.id===editCatId);
    if (cat) cat.name = name;

    data[curTab].push({id:'c'+Date.now(),name,tiles:[]});

  save(); closeCM(); render();
}

const KR_HOLIDAYS = {
  '01-01': '신정',

  '05-05': '어린이날',
  '06-06': '현충일',

  '12-25': '성탄절',
};
// 음력 공휴일은 연도별로 다르므로 주요 연도 하드코딩
const KR_LUNAR_HOLIDAYS = {
  '2024': {'02-09':'설날연휴','02-10':'설날','02-11':'설날연휴','04-10':'임시공휴일','09-16':'추석연휴','09-17':'추석','09-18':'추석연휴'},
  '2025': {'01-28':'설날연휴','01-29':'설날','01-30':'설날연휴','05-06':'대체공휴일','10-05':'추석연휴','10-06':'추석','10-07':'추석연휴','10-08':'대체공휴일'},
  '2026': {'02-17':'설날연휴','02-18':'설날','02-19':'설날연휴','05-25':'부처님오신날','09-24':'추석연휴','09-25':'추석','09-26':'추석연휴'},
};

function getHoliday(year, month, day) {
  const mmdd = String(month+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
  if (KR_HOLIDAYS[mmdd]) return KR_HOLIDAYS[mmdd];
  const lunar = KR_LUNAR_HOLIDAYS[String(year)];
  if (lunar && lunar[mmdd]) return lunar[mmdd];
  return null;
}

function renderHomeCal() {
  const el = document.getElementById('homeCalMonth');
  if (!el) return;
  el.textContent = homeCalYear + '년 ' + (homeCalMonth+1) + '월';
  const grid = document.getElementById('homeCalGrid');
  const dows = ['일','월','화','수','목','금','토'];
  let html = dows.map((d,i) => `<div style="text-align:center;font-size:10px;color:${i===0?'#e05555':i===6?'#3366dd':'#888aaa'};padding:4px 0;font-weight:700;">${d}</div>`).join('');
  const first = new Date(homeCalYear, homeCalMonth, 1).getDay();
  const last  = new Date(homeCalYear, homeCalMonth+1, 0).getDate();
  const prev  = new Date(homeCalYear, homeCalMonth, 0).getDate();
  let days = [];
  for(let i=first-1;i>=0;i--) days.push({d:prev-i,cur:false});
  for(let i=1;i<=last;i++) days.push({d:i,cur:true});
  while(days.length%7!==0) days.push({d:days.length-last-first+1,cur:false});
  days.forEach((day,i) => {
    const dow = i%7;
    const ds = day.cur ? homeCalYear+'-'+String(homeCalMonth+1).padStart(2,'0')+'-'+String(day.d).padStart(2,'0') : '';
    const isToday = day.cur && homeCalYear===homeToday.getFullYear() && homeCalMonth===homeToday.getMonth() && day.d===homeToday.getDate();
    const isSel = ds === homeSelDate;
    const hasMemo = ds && homeMemos[ds] && homeMemos[ds].trim();
    const holiday = day.cur ? getHoliday(homeCalYear, homeCalMonth, day.d) : null;
    const isHoliday = holiday !== null;
    let bg = isToday?'#3366dd':isSel?'rgba(51,102,221,0.12)':'transparent';
    let color = isToday?'#fff':(dow===0||isHoliday)?'#e05555':dow===6?'#3366dd':'#1a1a2e';
    if (!day.cur) color = '#ccc';
    // 일정 점 계산
    const scheds = day.cur && homeSchedules[ds] ? homeSchedules[ds] : [];
    const schedTypes = [...new Set(scheds.map(s=>s.type))];
    const schedDots = schedTypes.map(t => `<span style="display:inline-block;width:5px;height:5px;border-radius:50%;background:${SCHED_COLORS[t]||'#888'};margin:0 1px;"></span>`).join('');
    html += `<div onclick="if('${ds}')openCalPopup('${ds}',this)" title="${holiday||''}" style="text-align:center;padding:4px 1px 2px;border-radius:6px;cursor:pointer;background:${bg};color:${color};position:relative;font-size:12px;font-weight:${isToday?'700':'400'};">
      ${day.d}
      ${isHoliday&&!isToday?`<span style="position:absolute;top:2px;right:2px;width:4px;height:4px;border-radius:50%;background:#e05555;display:block;"></span>`:''}
      <div style="display:flex;justify-content:center;align-items:center;min-height:7px;gap:1px;margin-top:1px;">${schedDots}${hasMemo&&!schedTypes.length?`<span style="display:inline-block;width:4px;height:4px;border-radius:50%;background:#f4a261;"></span>`:''}</div>
    </div>`;
  });
  grid.innerHTML = html;
}

function homeSelectDate(ds) {
  if (!ds) return;
  homeSelDate = ds;
  renderHomeCal();
  homeLoadMemo();
  renderHomeStudents();
}


// ── 달력 일정 ─────────────────────────────
let homeSchedules = JSON.parse(localStorage.getItem('lf_schedules') || '{}');
const SCHED_COLORS = { purple: '#7c3aed', blue: '#2563eb', green: '#16a34a' };
const SCHED_LABELS = { purple: '연가', blue: '학교업무', green: '외부업무' };
let calPopupDateStr = '';

function openCalPopup(ds, el) {
  if (!ds) return;
  calPopupDateStr = ds;
  homeSelDate = ds;
  renderHomeCal();
  homeLoadMemo();
  renderHomeStudents();

  // 날짜 표시
  const d = new Date(ds);
  const dLabel = (d.getMonth()+1)+'월 '+d.getDate()+'일';
  document.getElementById('calPopupDate').textContent = dLabel;
  document.getElementById('calPopupInput').value = '';
  renderCalPopupList();

  // 팝업 위치 계산
  const popup = document.getElementById('calPopup');
  popup.style.display = 'block';
  document.getElementById('calPopupOverlay').style.display = 'block';

  const rect = el.getBoundingClientRect();
  const pw = 260;
  let left = rect.left + window.scrollX;
  let top = rect.bottom + window.scrollY + 4;
  if (left + pw > window.innerWidth - 8) left = window.innerWidth - pw - 8;
  if (left < 8) left = 8;
  popup.style.left = left + 'px';
  popup.style.top = top + 'px';
  popup.style.transform = 'none';
  setTimeout(() => document.getElementById('calPopupInput').focus(), 50);
}

function closeCalPopup() {
  document.getElementById('calPopup').style.display = 'none';
  document.getElementById('calPopupOverlay').style.display = 'none';
}

function renderCalPopupList() {
  const list = document.getElementById('calPopupList');
  const scheds = homeSchedules[calPopupDateStr] || [];
  if (!scheds.length) {
    list.innerHTML = '<div style="font-size:11px;color:#bbb;text-align:center;padding:6px;">일정 없음</div>';
    return;
  }
  list.innerHTML = scheds.map((s, i) => `
    <div style="display:flex;align-items:center;gap:8px;padding:6px 8px;background:#f7f8fc;border-radius:6px;border-left:3px solid ${SCHED_COLORS[s.type]};">
      <span style="font-size:10px;color:${SCHED_COLORS[s.type]};font-weight:700;min-width:44px;">${SCHED_LABELS[s.type]}</span>
      <span style="flex:1;font-size:12px;color:#1a1a2e;">${s.text}</span>
      <button onclick="delCalSchedule(${i})" style="background:none;border:none;color:#ccc;cursor:pointer;font-size:13px;padding:0 2px;">×</button>
    </div>`
  ).join('');
}

function addCalSchedule(type) {
  const text = document.getElementById('calPopupInput').value.trim();
  if (!text) return;
  if (!homeSchedules[calPopupDateStr]) homeSchedules[calPopupDateStr] = [];
  homeSchedules[calPopupDateStr].push({ type, text });
  syncSet('lf_schedules', homeSchedules);
  document.getElementById('calPopupInput').value = '';
  renderCalPopupList();
  renderHomeCal();
}

function delCalSchedule(idx) {
  homeSchedules[calPopupDateStr].splice(idx, 1);
  if (!homeSchedules[calPopupDateStr].length) delete homeSchedules[calPopupDateStr];
  syncSet('lf_schedules', homeSchedules);
  renderCalPopupList();
  renderHomeCal();
}

// Enter키로 일정 추가 (기본 파란색)
document.addEventListener('DOMContentLoaded', () => {
  const inp = document.getElementById('calPopupInput');
  if (inp) inp.addEventListener('keydown', e => { if(e.key==='Enter') addCalSchedule('blue'); });
});

// ── 홈 메모 ──────────────────────────────
function homeLoadMemo() {
  const ta = document.getElementById('homeMemoText');
  if (!ta) return;
  ta.value = homeMemos[homeSelDate] || '';
}

function renderHomeMemoDateBtns() { /* 날짜 버튼 제거됨 */ }

function homeAutoSaveMemo() {
  const val = document.getElementById('homeMemoText').value;
  homeMemos[homeSelDate] = val;
  syncSet('lf_memos', homeMemos);
  const st = document.getElementById('homeMemoStatus');
  if (st) st.textContent = '저장됨 ✓';
  clearTimeout(homeMemoTimer);
  homeMemoTimer = setTimeout(()=>{ const el=document.getElementById('homeMemoStatus'); if(el) el.textContent='자동저장'; }, 2000);
  renderHomeCal();
}

// ── 홈 학생 명단 ──────────────────────────
function renderHomeStudents() {
  const list = document.getElementById('homeStudentList');
  if (!list) return;
  const att = homeAttendance[homeSelDate] || {};
  if (!homeStudents.length) {
    list.innerHTML = '<div style="font-size:11px;color:#888aaa;text-align:center;padding:12px;">명단 없음</div>';
    updateHomeAttSum(); return;
  }
  list.innerHTML = homeStudents.map((s,i) => {
    const a = att[s.id]||'';
    return `<div style="display:flex;align-items:center;gap:7px;padding:6px 8px;background:#f7f8fc;border-radius:6px;border:1px solid rgba(0,0,0,0.06);">
      <span style="font-size:10px;color:#888aaa;min-width:18px;">${i+1}</span>
      <span style="flex:1;font-size:12px;font-weight:700;color:#1a1a2e;">${s.name}</span>
      <div style="display:flex;gap:3px;">
        <button onclick="homeSetAtt('${s.id}','present')" style="width:20px;height:20px;border-radius:50%;border:1px solid rgba(0,0,0,0.12);font-size:9px;cursor:pointer;background:${a==='present'?'#1db954':'transparent'};color:${a==='present'?'#fff':'#888aaa'};">✓</button>
        <button onclick="homeSetAtt('${s.id}','late')" style="width:20px;height:20px;border-radius:50%;border:1px solid rgba(0,0,0,0.12);font-size:9px;cursor:pointer;background:${a==='late'?'#f4a261':'transparent'};color:${a==='late'?'#fff':'#888aaa'};">◷</button>
        <button onclick="homeSetAtt('${s.id}','absent')" style="width:20px;height:20px;border-radius:50%;border:1px solid rgba(0,0,0,0.12);font-size:9px;cursor:pointer;background:${a==='absent'?'#e05555':'transparent'};color:${a==='absent'?'#fff':'#888aaa'};">✕</button>
      </div>
      <button onclick="homeDelStudent('${s.id}')" style="background:none;border:none;color:#ccc;cursor:pointer;font-size:13px;padding:0 2px;">×</button>
    </div>`;
  }).join('');
  updateHomeAttSum();
}

function updateHomeAttSum() {
  const att = homeAttendance[homeSelDate]||{};
  const p = Object.values(att).filter(v=>v==='present').length;
  const el = document.getElementById('homeAttSum');
  if(el) el.textContent = homeStudents.length ? `출석 ${p}/${homeStudents.length}` : '';
}

function homeAddStudent() {
  const inp = document.getElementById('homeStudentInput');
  const name = inp.value.trim(); if (!name) return;
  homeStudents.push({id:'s'+Date.now(), name});
  syncSet('lf_students', homeStudents);
  inp.value = '';
  renderHomeStudents();
}

function homeDelStudent(id) {
  homeStudents = homeStudents.filter(s=>s.id!==id);
  syncSet('lf_students', homeStudents);
  renderHomeStudents();
}

function homeSetAtt(sid, type) {
  if (!homeAttendance[homeSelDate]) homeAttendance[homeSelDate]={};
  homeAttendance[homeSelDate][sid] = homeAttendance[homeSelDate][sid]===type?'':type;
  syncSet('lf_attendance', homeAttendance);
  renderHomeStudents();
}

// ── 홈 시간표 ─────────────────────────────
function renderHomeTimetable() {
  const el = document.getElementById('homeTimetable');
  if (!el) return;
  const days = ['월','화','수','목','금'];
  const todayDow = new Date().getDay();
  let html = '<tr><th style="background:#f0f2f7;border:1px solid rgba(0,0,0,0.08);padding:4px 3px;font-size:9px;color:#888aaa;width:18px;"></th>';
  days.forEach((d,i) => {
    const isT = (i+1)===todayDow;
    html += `<th style="background:#f0f2f7;border:1px solid rgba(0,0,0,0.08);padding:4px 6px;font-size:9px;color:${isT?'#3366dd':'#888aaa'};text-align:center;min-width:44px;">${d}</th>`;
  });
  html += '</tr>';
  for(let p=1;p<=6;p++) {
    html += `<tr><td style="background:#f0f2f7;border:1px solid rgba(0,0,0,0.08);padding:3px;font-size:9px;color:#888aaa;text-align:center;font-weight:700;">${p}</td>`;
    for(let d=1;d<=5;d++) {
      const key = d+'-'+p;
      const val = homeTimetable[key]||'';
      const bg = homeTTColors[key] || 'transparent';
      const tc = bg!=='transparent' ? getContrastColor(bg) : '#1a1a2e';
      html += `<td style="border:1px solid rgba(0,0,0,0.08);padding:0;position:relative;background:${bg};">
        <input value="${val}" style="width:100%;background:transparent;border:none;color:${tc};font-size:10px;text-align:center;outline:none;padding:3px 2px;font-family:inherit;height:28px;cursor:pointer;"
          onchange="homeSaveTT('${key}',this.value)" onclick="this.select()"
          oncontextmenu="event.preventDefault();event.stopPropagation();openTTColor('${key}')">
        <div id="ttcp-${key}" style="display:none;position:absolute;top:100%;left:0;z-index:50;background:#fff;border:1px solid rgba(0,0,0,0.12);border-radius:8px;padding:8px;box-shadow:0 4px 16px rgba(0,0,0,0.12);min-width:130px;">
          <div style="font-size:9px;color:#888aaa;margin-bottom:6px;">칸 색상 (우클릭)</div>
          <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;">
            ${['#fff3cd','#d1ecf1','#d4edda','#f8d7da','#e2d9f3','#fde2e2','#cce5ff','#dff0d8','transparent'].map(c =>
              `<div onclick="setTTColor('${key}','${c}')" style="width:20px;height:20px;border-radius:4px;cursor:pointer;background:${c==='transparent'?'repeating-linear-gradient(45deg,#ddd 0,#ddd 2px,white 0,white 6px)':c};border:1px solid rgba(0,0,0,0.1);"></div>`
            ).join('')}
          </div>
          <input type="color" onchange="setTTColor('${key}',this.value)" style="width:100%;height:24px;border:1px solid rgba(0,0,0,0.1);border-radius:4px;cursor:pointer;padding:1px;">
        </div>
      </td>`;
    }
    html += '</tr>';
  }
  el.innerHTML = html;
}

function getContrastColor(hex) {
  if (!hex || hex==='transparent') return '#1a1a2e';
  try {
    const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    return (r*299+g*587+b*114)/1000 > 128 ? '#222' : '#fff';
  } catch(e) { return '#1a1a2e'; }
}

function openTTColor(key) {
  closeTTColorPickers();
  const picker = document.getElementById('ttcp-'+key);
  if (!picker) return;
  // 기본은 아래, 화면 아래쪽이면 위로
  picker.style.top = 'auto';
  picker.style.bottom = 'auto';
  picker.style.display = 'block';
  const rect = picker.getBoundingClientRect();
  if (rect.bottom > window.innerHeight - 20) {
    picker.style.top = 'auto';
    picker.style.bottom = '100%';
  } else {
    picker.style.top = '100%';
    picker.style.bottom = 'auto';
  }
  event.stopPropagation();
}

function setTTColor(key, color) {
  homeTTColors[key] = color;
  syncSet('lf_tt_colors', homeTTColors);
  closeTTColorPickers();
  renderHomeTimetable();
}

function closeTTColorPickers() {
  document.querySelectorAll('[id^="ttcp-"]').forEach(el => el.style.display='none');
}

function homeSaveTT(key, val) {
  homeTimetable[key] = val;
  syncSet('lf_timetable', homeTimetable);
}


// 학생명단·메모 높이를 달력의 2배로 맞추기
function matchPanelHeights() {
  const cal = document.getElementById('homeCalPanel');
  const student = document.querySelector('.home-student-panel');
  const memo = document.querySelector('.home-memo-panel');
  if (!cal || !student || !memo) return;
  const calH = cal.offsetHeight;
  student.style.minHeight = (calH * 2) + 'px';
  memo.style.minHeight = (calH * 2) + 'px';
}
window.addEventListener('resize', matchPanelHeights);
document.addEventListener('click', closeTTColorPickers);
history.replaceState({ page: 'home' }, '', '');
updateCounts();
renderHomeCal();
renderHomeStudents();
renderHomeTimetable();
homeLoadMemo();
syncLoad();
setTimeout(matchPanelHeights, 100);
</script>
