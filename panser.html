<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="./favicon.png">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>판서</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Nanum+Myeongjo:wght@400;700;800&family=Nanum+Pen+Script&family=Nanum+Brush+Script&family=Do+Hyeon&family=Jua&family=Black+Han+Sans&family=Gothic+A1:wght@400;700;900&family=Noto+Sans+KR:wght@400;700&family=Noto+Serif+KR:wght@400;700&family=Hi+Melody&family=Gaegu&family=Cute+Font&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Malgun Gothic', '맑은 고딕', 'Apple SD Gothic Neo', sans-serif;
    background: #f4f6fa;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* 툴바 */
  .toolbar {
    background: #fff;
    border-bottom: 1px solid rgba(0,0,0,0.08);
    padding: 5px 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    position: sticky;
    top: 0;
    z-index: 10;
    font-size: 85%;
  }

  .toolbar-group {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 0 8px;
    border-right: 1px solid rgba(0,0,0,0.1);
  }
  .toolbar-group:last-child { border-right: none; }

  .tb-btn {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid transparent;
    border-radius: 6px;
    cursor: pointer;
    background: transparent;
    font-size: 18px;
    font-family: inherit;
    transition: all 0.15s;
    color: #1a1a2e;
  }
  .tb-btn:hover { background: #f0f2f7; border-color: rgba(0,0,0,0.1); }
  .tb-btn.active { background: #e8eeff; border-color: #3366dd; color: #3366dd; }

  .tb-label {
    font-size: 13px;
    color: #888aaa;
    white-space: nowrap;
  }

  .font-size-input {
    width: 58px; height: 36px;
    border: 1px solid rgba(0,0,0,0.12);
    border-radius: 6px;
    text-align: center;
    font-size: 18px;
    font-family: inherit;
    outline: none;
    color: #1a1a2e;
    padding: 0 4px;
  }
  .font-size-input:focus { border-color: #3366dd; }

  .color-btn {
    width: 34px; height: 34px;
    border-radius: 6px;
    border: 2px solid rgba(0,0,0,0.15);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s;
  }
  .color-btn:hover { transform: scale(1.1); }
  .color-btn input[type="color"] {
    position: absolute;
    inset: -4px;
    width: calc(100% + 8px);
    height: calc(100% + 8px);
    opacity: 0;
    cursor: pointer;
  }

  .tb-select {
    height: 36px;
    border: 1px solid rgba(0,0,0,0.12);
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
    padding: 0 6px;
    outline: none;
    color: #1a1a2e;
    background: #fff;
    cursor: pointer;
  }

  .btn-print {
    margin-left: auto;
    padding: 7px 18px;
    background: #1a1a2e;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.2s;
  }
  .btn-print:hover { background: #3366dd; }

  /* 편집 영역 */
  .editor-wrap {
    flex: 1;
    display: flex;
    padding: 0;
    background: #fff;
  }

  .editor-page {
    flex: 1;
    width: 100%;
    min-height: calc(100vh - 60px);
    background: #fff;
    box-shadow: none;
    border-radius: 0;
    padding: 5mm 10mm 10mm 10mm;
    outline: none;
    font-family: 'Dotum', '돋움', 'Apple SD Gothic Neo', sans-serif;
    font-size: 75px;
    line-height: 1.5;
    color: #000;
    word-break: break-word;
    overflow-wrap: break-word;
  }

  .editor-page:focus {
    outline: none;
    box-shadow: none;
  }

  .editor-page:empty::before {
    content: '여기에 입력하세요...';
    color: #ccc;
    pointer-events: none;
  }

  /* 인쇄용 헤더 - 평소엔 숨김 */
  #printHeader {
    display: none;
  }

  /* 인쇄 전용 래퍼 - 평소엔 숨김 */
  #printWrapper { display: none; }

  @media print {
    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    html, body {
      width: 210mm;
      height: 297mm;
      margin: 0;
      padding: 0;
      background: #fff;
    }
    .toolbar { display: none !important; }
    .editor-wrap { display: none !important; }

    #printWrapper {
      display: block !important;
      width: 210mm;
      height: 297mm;
      margin: 0;
      padding: 5mm 10mm 10mm 10mm;
      box-sizing: border-box;
      position: relative;
      background: #fff;
    }

    /* 이중 테두리 */
    #printFrame {
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      border: 3.5px double #1a1a2e;
      padding: 4mm;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* 머릿말 */
    #printHeader {
      display: block !important;
      padding: 3mm 6mm 3mm;
      font-family: 'Nanum Gothic', '나눔고딕', sans-serif;
      font-size: 16pt;
      font-weight: 700;
      color: #1a1a2e;
      text-align: left;
      letter-spacing: 1px;
      border-bottom: 2px solid #1a1a2e;
      margin-bottom: 3mm;
    }

    /* 본문 */
    #printContent {
      flex: 1;
      padding: 3mm 6mm;
      line-height: 1.6;
      color: #000;
      word-break: break-word;
      overflow: hidden;
    }

    @page {
      size: A4 portrait;
      margin: 0;
    }
  }

  @media (max-width: 700px) {
    .editor-wrap { padding: 0; }
    .editor-page {
      width: 100%;
      min-height: calc(100vh - 80px);
      font-size: 40px;
      padding: 5mm 10mm 10mm 10mm;
    }
  }

  .sym-item {
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    color: #1a1a2e;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .sym-item:hover { background: #f0f4ff; }
  .sym-item.active { background: #e8eeff; color: #3366dd; font-weight: 700; }
</style>
</head>
<body>

<div class="toolbar">

  <!-- 폰트 선택 -->
  <div class="toolbar-group">
    <span class="tb-label">폰트</span>
    <select class="tb-select" id="fontSelect" onchange="applyFont(this.value)" style="width:140px;">
      <option value="'Dotum','돋움',sans-serif">돋움</option>
      <option value="'Malgun Gothic','맑은 고딕',sans-serif">맑은 고딕</option>
      <option value="'Nanum Gothic',sans-serif">나눔고딕</option>
      <option value="'Nanum Myeongjo',serif">나눔명조</option>
      <option value="'Nanum Pen Script',cursive">나눔손글씨펜</option>
      <option value="'Nanum Brush Script',cursive">나눔손글씨붓</option>
      <option value="'Do Hyeon',sans-serif">도현</option>
      <option value="'Jua',sans-serif">주아</option>
      <option value="'Black Han Sans',sans-serif">검은고딕</option>
      <option value="'Gothic A1',sans-serif">고딕A1</option>
      <option value="'Noto Sans KR',sans-serif">Noto Sans</option>
      <option value="'Noto Serif KR',serif">Noto Serif</option>
      <option value="'Hi Melody',cursive">하이멜로디</option>
      <option value="'Gaegu',cursive">개구</option>
      <option value="'Cute Font',cursive">귀여운글씨</option>
    </select>
  </div>

  <!-- 폰트 크기 -->
  <div class="toolbar-group">
    <span class="tb-label">크기</span>
    <button class="tb-btn" onclick="changeFontSize(-5)" title="크기 줄이기">−</button>
    <input class="font-size-input" id="fontSizeInput" type="number" value="75" min="8" max="300"
      onchange="applyFontSize(this.value)" onkeydown="if(event.key==='Enter')applyFontSize(this.value)">
    <button class="tb-btn" onclick="changeFontSize(5)" title="크기 키우기">＋</button>
  </div>

  <!-- 서식 -->
  <div class="toolbar-group">
    <button class="tb-btn" id="btn-bold" onclick="fmt('bold')" title="굵게" style="font-weight:900;">B</button>
    <button class="tb-btn" id="btn-italic" onclick="fmt('italic')" title="기울기" style="font-style:italic;">I</button>
    <button class="tb-btn" id="btn-underline" onclick="fmt('underline')" title="밑줄" style="text-decoration:underline;">U</button>
    <button class="tb-btn" id="btn-strikeThrough" onclick="fmt('strikeThrough')" title="취소선" style="text-decoration:line-through;">S</button>
  </div>

  <!-- 글자색 -->
  <div class="toolbar-group">
    <span class="tb-label">글자색</span>
    <div class="color-btn" id="textColorPreview" style="background:#000000;" title="글자색">
      <input type="color" id="textColor" value="#000000" oninput="applyTextColor(this.value)">
    </div>
  </div>

  <!-- 형광펜 -->
  <div class="toolbar-group">
    <span class="tb-label">형광펜</span>
    <div class="color-btn" id="highlightPreview" style="background:#ffff00;" title="형광펜">
      <input type="color" id="highlightColor" value="#ffff00" oninput="applyHighlight(this.value)">
    </div>
    <button class="tb-btn" id="btn-highlight" onclick="toggleHighlight()" title="형광펜 적용">🖊</button>
  </div>

  <!-- 배경색 -->
  <div class="toolbar-group">
    <span class="tb-label">배경색</span>
    <div class="color-btn" id="bgColorPreview" style="background:#ffffff;" title="배경색">
      <input type="color" id="bgColor" value="#ffffff" oninput="applyBgColor(this.value)">
    </div>
    <button class="tb-btn" onclick="resetBgColor()" title="배경색 초기화">↺</button>
  </div>

  <!-- 목록 기호 -->
  <div class="toolbar-group" style="position:relative;">
    <span class="tb-label">기호</span>
    <button class="tb-btn" onclick="toggleSymbolMenu()" id="symbolMenuBtn" title="기호 선택" style="font-size:13px;width:auto;padding:0 8px;">기호 ▾</button>
    <div id="symbolMenu" style="display:none;position:absolute;top:100%;left:0;background:#fff;border:1px solid rgba(0,0,0,0.12);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.12);z-index:100;min-width:160px;padding:4px 0;margin-top:4px;">
      <div class="sym-item" onclick="applySymbol('bullet')">• 글머리 기호</div>
      <div class="sym-item" onclick="applySymbol('number')">1. 번호 목록</div>
      <div class="sym-item" onclick="applySymbol('check_empty')">☐ 체크박스</div>
      <div class="sym-item" onclick="applySymbol('check_done')">✓ 완료</div>
      <div class="sym-item" onclick="applySymbol('arrow')">→ 화살표</div>
      <div class="sym-item" onclick="applySymbol('star')">★ 별표</div>
      <div class="sym-item" onclick="applySymbol('diamond')">◆ 다이아몬드</div>
      <div class="sym-item" onclick="applySymbol('triangle')">▶ 삼각형</div>
      <div class="sym-item" onclick="applySymbol('dash')">— 대시</div>
      <div class="sym-item" onclick="applySymbol('none')" style="color:#888;">✕ 기호 없음</div>
    </div>
  </div>

  <!-- 인쇄 -->
  <div style="display:flex;gap:6px;margin-left:auto;">
    <button class="btn-print" style="background:#3366dd;" onclick="saveDoc()">💾 저장</button>
    <button class="btn-print" style="background:#444;" onclick="openDocList()">📂 목록</button>
    <button class="btn-print" onclick="printPage()">🖨 인쇄</button>
  </div>
</div>

<!-- 인쇄 전용 레이아웃 (인쇄시에만 표시) -->
<div id="printWrapper">
  <div id="printFrame">
    <div id="printHeader"></div>
    <div id="printContent"></div>
  </div>
</div>

<!-- 편집 영역 -->
<div class="editor-wrap">
  <div class="editor-page" id="editor" contenteditable="true" spellcheck="false"></div>
</div>

<script>




// ── Supabase 연동 ─────────────────────────
const SB_URL = 'https://sfzxlphbkrzwaixupriq.supabase.co';
const SB_KEY = 'sb_publishable_wIp2Vt2Ytg8SHaH4OXtQPQ_PWuzDZ1e';

async function sbGet(key) {
  try {
    const res = await fetch(`${SB_URL}/rest/v1/widget_data?id=eq.${key}&select=data`, {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    const rows = await res.json();
    return rows.length ? rows[0].data : null;
  } catch(e) { return null; }
}

async function sbSet(key, value) {
  try {
    const res = await fetch(`${SB_URL}/rest/v1/widget_data`, {
      method: 'POST',
      headers: {
        'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY,
        'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates'
      },
      body: JSON.stringify({ id: key, data: value, updated_at: new Date().toISOString() })
    });
    if (!res.ok) throw new Error('sbSet failed');
    return res;
  } catch(e) { console.error('sbSet error', e); throw e; }
}

async function loadPanserDocs() {
  const remote = await sbGet('lf_panser_docs');
  if (remote && Array.isArray(remote)) {
    panserDocs = remote;
    localStorage.setItem('판서_docs', JSON.stringify(panserDocs));
  }
}


const editor = document.getElementById('editor');

// ── 포커스 유지 ────────────────────────────
function focusEditor() {
  editor.focus();
}

// ── 서식 명령 ─────────────────────────────
function fmt(cmd) {
  focusEditor();
  document.execCommand(cmd, false, null);
  updateToolbarState();
}


// ── 목록 기호 ──────────────────────────────
let currentSymbol = null;
let symbolCounter = 1;

const SYMBOLS = {
  bullet:      { label: '•',  get: (n) => '• ' },
  number:      { label: '1.', get: (n) => n + '. ' },
  check_empty: { label: '☐',  get: (n) => '☐ ' },
  check_done:  { label: '✓',  get: (n) => '✓ ' },
  arrow:       { label: '→',  get: (n) => '→ ' },
  star:        { label: '★',  get: (n) => '★ ' },
  diamond:     { label: '◆',  get: (n) => '◆ ' },
  triangle:    { label: '▶',  get: (n) => '▶ ' },
  dash:        { label: '—',  get: (n) => '— ' },
};

function toggleSymbolMenu() {
  const menu = document.getElementById('symbolMenu');
  menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
}

function applySymbol(type) {
  document.getElementById('symbolMenu').style.display = 'none';

  if (type === 'none') {
    currentSymbol = null;
    symbolCounter = 1;
    document.getElementById('symbolMenuBtn').textContent = '기호 ▾';
    document.querySelectorAll('.sym-item').forEach(i => i.classList.remove('active'));
    focusEditor();
    return;
  }

  currentSymbol = type;
  const sym = SYMBOLS[type];
  document.getElementById('symbolMenuBtn').textContent = sym.label + ' ▾';
  document.querySelectorAll('.sym-item').forEach(i => i.classList.remove('active'));
  if (event && event.target) event.target.classList.add('active');

  // 블록 선택된 경우 - 각 줄 앞에 기호 삽입
  const sel = window.getSelection();
  if (sel && !sel.isCollapsed) {
    const range = sel.getRangeAt(0);
    const selectedText = sel.toString();
    const lines = selectedText.split('\n');
    let lineNum = 1;
    symbolCounter = 1;
    const newLines = lines.map(l => {
      if (l.trim() === '') return l;
      return sym.get(lineNum++) + l;
    });
    const newText = newLines.join('\n');
    range.deleteContents();
    const textNode = document.createTextNode(newText);
    range.insertNode(textNode);
    range.setStartAfter(textNode);
    range.collapse(true);
    sel.removeAllRanges();
    sel.addRange(range);
    symbolCounter = lineNum; // 다음 줄부터 이어서
  } else {
    // 선택 없으면 커서 위치에 기호 삽입
    symbolCounter = 1;
    document.execCommand('insertText', false, sym.get(symbolCounter++));
  }

  focusEditor();
}

// 엔터 시 자동으로 기호 삽입 (카운터 이어서)
editor.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && currentSymbol && SYMBOLS[currentSymbol]) {
    e.preventDefault();
    const sym = SYMBOLS[currentSymbol];
    document.execCommand('insertText', false, '\n' + sym.get(symbolCounter++));
  }
  // 백스페이스로 기호 삭제 시 카운터 감소
  if (e.key === 'Backspace' && currentSymbol === 'number' && symbolCounter > 1) {
    // 카운터는 유지 (줄 삭제 시 재입력하면 자동으로 다음 번호)
  }
});

// 메뉴 외부 클릭 시 닫기
document.addEventListener('click', function(e) {
  if (!e.target.closest('#symbolMenu') && !e.target.closest('#symbolMenuBtn')) {
    const menu = document.getElementById('symbolMenu');
    if (menu) menu.style.display = 'none';
  }
});

// ── 폰트 선택 ─────────────────────────────
function applyFont(fontFamily) {
  const sel = window.getSelection();
  if (sel && !sel.isCollapsed) {
    document.execCommand('fontName', false, fontFamily);
  } else {
    editor.style.fontFamily = fontFamily;
  }
  autoSave();
}

// ── 폰트 크기 ─────────────────────────────
let currentFontSize = 75;

function applyFontSize(val) {
  currentFontSize = Math.max(8, Math.min(300, parseInt(val) || 75));
  document.getElementById('fontSizeInput').value = currentFontSize;
  const sel = window.getSelection();
  if (sel && !sel.isCollapsed) {
    // 선택 영역에만 적용
    document.execCommand('fontSize', false, '7');
    const spans = editor.querySelectorAll('font[size="7"]');
    spans.forEach(s => {
      s.removeAttribute('size');
      s.style.fontSize = currentFontSize + 'px';
    });
  } else {
    editor.style.fontSize = currentFontSize + 'px';
  }
  focusEditor();
}

function changeFontSize(delta) {
  applyFontSize(currentFontSize + delta);
}

// ── 글자색 ────────────────────────────────
function applyTextColor(color) {
  document.getElementById('textColorPreview').style.background = color;
  focusEditor();
  document.execCommand('foreColor', false, color);
}

// ── 형광펜 ────────────────────────────────
let highlightOn = false;

function applyHighlight(color) {
  document.getElementById('highlightPreview').style.background = color;
}

function toggleHighlight() {
  highlightOn = !highlightOn;
  const btn = document.getElementById('btn-highlight');
  btn.classList.toggle('active', highlightOn);
  if (highlightOn) {
    const color = document.getElementById('highlightColor').value;
    focusEditor();
    document.execCommand('hiliteColor', false, color);
  } else {
    focusEditor();
    document.execCommand('hiliteColor', false, 'transparent');
  }
}

// ── 배경색 ────────────────────────────────
function applyBgColor(color) {
  document.getElementById('bgColorPreview').style.background = color;
  editor.style.background = color;
}

function resetBgColor() {
  document.getElementById('bgColor').value = '#ffffff';
  document.getElementById('bgColorPreview').style.background = '#ffffff';
  editor.style.background = '#ffffff';
}

// ── 툴바 상태 업데이트 ────────────────────
function updateToolbarState() {
  ['bold','italic','underline','strikeThrough'].forEach(cmd => {
    const btn = document.getElementById('btn-' + cmd);
    if (btn) btn.classList.toggle('active', document.queryCommandState(cmd));
  });
}

editor.addEventListener('keyup', updateToolbarState);
editor.addEventListener('mouseup', updateToolbarState);
editor.addEventListener('selectionchange', updateToolbarState);

// ── 인쇄 ─────────────────────────────────
function printPage() {
  const now = new Date();
  const yyyy = now.getFullYear();
  const mm = String(now.getMonth() + 1).padStart(2, '0');
  const dd = String(now.getDate()).padStart(2, '0');

  // 머릿말
  document.getElementById('printHeader').textContent =
    `${yyyy}년 ${mm}월 ${dd}일 봉서초 6학년 5반 알림장`;

  // 본문 복사 - 화면 px → 인쇄 pt 변환
  // 75px 기준 20pt (A4 본문 크기 기준)
  const pc = document.getElementById('printContent');
  pc.innerHTML = editor.innerHTML;
  pc.style.fontFamily = editor.style.fontFamily || '';
  const basePx = parseFloat(editor.style.fontSize) || currentFontSize || 75;
  const basePt = Math.round(basePx * (20 / 75));
  pc.style.fontSize = Math.max(6, basePt) + 'pt';
  pc.style.background = 'transparent';

  window.print();
}

// ── 자동 저장 (브라우저 닫아도 복원) ─────

// ── 저장 목록 ─────────────────────────────
let panserDocs = JSON.parse(localStorage.getItem('판서_docs') || '[]');

function saveDoc() {
  const now = new Date();
  const defaultName = now.getFullYear() + '년 ' + (now.getMonth()+1) + '월 ' + now.getDate() + '일';
  document.getElementById('saveNameInput').value = defaultName;
  document.getElementById('saveModal').style.display = 'flex';
  setTimeout(() => {
    const inp = document.getElementById('saveNameInput');
    inp.focus(); inp.select();
  }, 50);
}

function closeSaveModal() {
  document.getElementById('saveModal').style.display = 'none';
}

function confirmSave() {
  const name = document.getElementById('saveNameInput').value.trim();
  if (!name) { alert('이름을 입력해주세요.'); return; }
  const now = new Date();
  const doc = {
    id: Date.now(),
    name,
    date: now.toLocaleDateString('ko-KR'),
    content: editor.innerHTML,
    fontSize: currentFontSize,
    fontFamily: editor.style.fontFamily || '',
    bgColor: editor.style.background || '#fff',
  };
  panserDocs.unshift(doc);
  localStorage.setItem('판서_docs', JSON.stringify(panserDocs));
  closeSaveModal();
  renderDocList();
  showToastP('저장 중...');
  sbSet('lf_panser_docs', panserDocs).then(() => {
    showToastP('☁ 저장됨 ✓');
  }).catch(() => {
    showToastP('⚠ 로컬만 저장됨');
  });
}

async function openDocList() {
  await loadPanserDocs();
  renderDocList();
  document.getElementById('docListPanel').style.display = 'flex';
  document.getElementById('docListOverlay').style.display = 'block';
}

function closeDocList() {
  document.getElementById('docListPanel').style.display = 'none';
  document.getElementById('docListOverlay').style.display = 'none';
}

function renderDocList() {
  const el = document.getElementById('docListItems');
  if (!panserDocs.length) {
    el.innerHTML = '<div style="text-align:center;color:#bbb;font-size:13px;padding:40px 20px;">저장된 내용이 없습니다</div>';
    return;
  }
  el.innerHTML = panserDocs.map((doc, i) => `
    <div style="display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid rgba(0,0,0,0.05);transition:background 0.15s;" onmouseover="this.style.background='#f7f8fc'" onmouseout="this.style.background='transparent'">
      <div style="flex:1;cursor:pointer;" onclick="loadDoc(${i})">
        <div style="font-size:13px;font-weight:700;color:#1a1a2e;">${doc.name}</div>
        <div style="font-size:11px;color:#888;margin-top:2px;">${doc.date}</div>
      </div>
      <button onclick="loadDoc(${i})" style="padding:5px 12px;background:#3366dd;color:#fff;border:none;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:700;white-space:nowrap;">불러오기</button>
      <button onclick="deleteDoc(${i})" style="padding:5px 8px;background:#f0f2f7;color:#e05555;border:none;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;">🗑</button>
    </div>`
  ).join('');
}

function loadDoc(i) {
  const doc = panserDocs[i];
  if (!doc) return;
  if (!confirm(`"${doc.name}" 을 불러올까요?
현재 내용은 저장 후 불러오기를 권장합니다.`)) return;
  editor.innerHTML = doc.content;
  currentFontSize = doc.fontSize || 75;
  document.getElementById('fontSizeInput').value = currentFontSize;
  editor.style.fontSize = currentFontSize + 'px';
  editor.style.fontFamily = doc.fontFamily || '';
  editor.style.background = doc.bgColor || '#fff';
  // 폰트 선택 복원
  if (doc.fontFamily) {
    const sel = document.getElementById('fontSelect');
    for (let j = 0; j < sel.options.length; j++) {
      if (sel.options[j].value === doc.fontFamily) { sel.selectedIndex = j; break; }
    }
  }
  closeDocList();
  showToastP(`"${doc.name}" 불러왔습니다`);
}

function deleteDoc(i) {
  if (!confirm('삭제할까요?')) return;
  panserDocs.splice(i, 1);
  localStorage.setItem('판서_docs', JSON.stringify(panserDocs));
  sbSet('lf_panser_docs', panserDocs).catch(e => console.error('삭제 동기화 실패:', e));
  renderDocList();
}

function showToastP(msg) {
  let t = document.getElementById('panserToast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'panserToast';
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(40px);background:#1a1a2e;color:#fff;padding:10px 24px;border-radius:30px;font-size:13px;opacity:0;transition:all 0.3s;z-index:999;pointer-events:none;white-space:nowrap;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  t.style.transform = 'translateX(-50%) translateY(0)';
  setTimeout(() => {
    t.style.opacity = '0';
    t.style.transform = 'translateX(-50%) translateY(40px)';
  }, 2500);
}

function autoSave() {
  localStorage.setItem('판서_content', editor.innerHTML);
  localStorage.setItem('판서_fontSize', currentFontSize);
  localStorage.setItem('판서_bgColor', editor.style.background || '#ffffff');
  localStorage.setItem('판서_font', editor.style.fontFamily || '');
}

function autoLoad() {
  const saved = localStorage.getItem('판서_content');
  const savedSize = localStorage.getItem('판서_fontSize');
  const savedBg = localStorage.getItem('판서_bgColor');
  const savedFont = localStorage.getItem('판서_font');
  if (saved) editor.innerHTML = saved;
  if (savedSize) { currentFontSize = parseInt(savedSize); document.getElementById('fontSizeInput').value = currentFontSize; editor.style.fontSize = currentFontSize + 'px'; }
  if (savedBg) { editor.style.background = savedBg; document.getElementById('bgColor').value = savedBg; document.getElementById('bgColorPreview').style.background = savedBg; }
  if (savedFont) { editor.style.fontFamily = savedFont; const sel = document.getElementById('fontSelect'); for(let i=0;i<sel.options.length;i++){ if(sel.options[i].value===savedFont){sel.selectedIndex=i;break;} } }
}

editor.addEventListener('input', autoSave);
autoLoad();
// 목록 Supabase 동기화
loadPanserDocs();

// 초기 포커스
setTimeout(() => editor.focus(), 100);
</script>

<!-- 저장 목록 패널 -->
<div id="docListPanel" style="display:none;position:fixed;top:0;right:0;width:320px;max-width:95vw;height:100vh;background:#fff;box-shadow:-4px 0 24px rgba(0,0,0,0.12);z-index:200;display:none;flex-direction:column;">
  <div style="padding:16px 20px;border-bottom:1px solid rgba(0,0,0,0.08);display:flex;align-items:center;justify-content:space-between;">
    <div style="font-size:16px;font-weight:700;color:#1a1a2e;">📂 저장 목록</div>
    <button onclick="closeDocList()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#888;">×</button>
  </div>
  <div style="padding:12px 16px;border-bottom:1px solid rgba(0,0,0,0.06);">
    <button onclick="saveDoc()" style="width:100%;padding:10px;background:#3366dd;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">💾 현재 내용 저장</button>
  </div>
  <div id="docListItems" style="flex:1;overflow-y:auto;padding:8px 0;"></div>
</div>
<div id="docListOverlay" onclick="closeDocList()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:199;"></div>

<!-- 저장 이름 입력 모달 -->
<div id="saveModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:300;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:12px;padding:24px;width:90%;max-width:320px;box-shadow:0 8px 32px rgba(0,0,0,0.15);">
    <div style="font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:14px;">저장 이름</div>
    <input id="saveNameInput" style="width:100%;padding:10px 14px;border:1px solid rgba(0,0,0,0.12);border-radius:8px;font-size:14px;outline:none;font-family:inherit;color:#1a1a2e;margin-bottom:14px;" placeholder="예) 2026년 5월 알림장">
    <div style="display:flex;gap:8px;">
      <button onclick="closeSaveModal()" style="flex:1;padding:10px;background:#f0f2f7;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit;color:#666;">취소</button>
      <button onclick="confirmSave()" style="flex:1;padding:10px;background:#3366dd;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">저장</button>
    </div>
  </div>
</div>
</body>
</html>
